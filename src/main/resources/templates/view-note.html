<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add New Note | Note Making App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">


    <style>
        body {
            background-color: #121212;
            color: white;
        }

        .container {
            margin-top: 50px;
        }

        .card {
            background-color: #1e1e1e;
            border-radius: 15px;
            padding: 30px;
        }

        input, textarea {
            background-color: #2a2a2a;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px;
            width: 100%;
            margin-bottom: 20px;
        }

        input:focus, textarea:focus {
            outline: none;
            box-shadow: 0 0 5px #ffffff;
        }

        button {
            background-color: #ff4c4c;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: #ff0000;
        }

        a {
            color: white;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
    </head>
<body>

<div class="container">
    <div class="card text-white bg-dark mb-3">
        <div class="card-body">
            <h2 class="card-title" th:text="${note.title}"></h2>
            <p th:text="${note.content}"></p>
        </div>

    </div>
   <br>

    <a th:href="@{/dashboard}" class="btn btn-primary">Back to My Notes</a>

    <br>
    <br>
    <form th:action="@{/ai/notes/{id}/generate-questions(id=${note.id})}" method="post">
        <button type="submit" class="btn btn-primary">
            Generate Questions
        </button>
    </form>
    <div th:if="${generatedQuestions != null}" class="mt-4">
    <h3 class="mb-3">Generated Questions</h3>

    <div class="card p-4" style="background-color:#1e1e1e; border-radius:12px;">
        <pre th:text="${generatedQuestions}"
             style="
                white-space: pre-wrap;
                word-wrap: break-word;
                color: #f8f9fa;
                font-size: 15px;
                line-height: 1.6;
                margin: 0;
             ">
        </pre>
    </div>
</div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
