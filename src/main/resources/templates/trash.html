<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Trash | StudyIt</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            background-color: #121212;
            color: white;
        }

        .note-card {
            background-color: #1f1f1f;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .note-card h5 {
            color: #fff;
        }

        .note-card p {
            color: #ccc;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">🗑 Trash</span>
    <a th:href="@{/MyNotes}" class="btn btn-outline-light btn-sm">Back</a>
</nav>

<div class="container mt-4">

    <h3>Deleted Notes</h3>

    <div th:if="${#lists.isEmpty(notes)}">
        <p>No deleted notes.</p>
    </div>

    <div class="row" th:each="note : ${notes}">
        <div class="col-md-6">

            <div class="note-card">

                <h5 th:text="${note.title}">Title</h5>
                <p th:text="${#strings.abbreviate(note.content, 150)}"></p>

                <div class="mt-3">

                    <!-- Restore -->
                    <a th:href="@{/notes/restore/{id}(id=${note.id})}"
                       class="btn btn-success btn-sm">
                        <i class="fa-solid fa-rotate-left"></i> Restore
                    </a>

                    <!-- Permanent Delete -->
                    <a th:href="@{/notes/permanent-delete/{id}(id=${note.id})}"
                       class="btn btn-danger btn-sm">
                        <i class="fa-solid fa-trash"></i> Delete Forever
                    </a>

                </div>

            </div>

        </div>
    </div>

</div>

</body>
</html>
